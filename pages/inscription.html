<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Saveurs de Bordeaux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Saveurs de Bordeaux</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="menus.html">Nos Menus</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Inscription</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTENU -->
  <div class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h2 class="text-center mb-4">Créer un compte</h2>
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" placeholder="Votre nom">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" class="form-control" placeholder="Votre prénom">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Adresse email</label>
              <input type="email" class="form-control" placeholder="votre@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Numéro GSM</label>
              <input type="tel" class="form-control" placeholder="06 00 00 00 00">
            </div>
            <div class="mb-3">
              <label class="form-label">Adresse postale</label>
              <input type="text" class="form-control" placeholder="Votre adresse">
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" placeholder="10 caractères min.">
              <small class="text-muted">Au moins 10 caractères, 1 majuscule, 1 minuscule, 1 chiffre, 1 caractère spécial</small>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmer le mot de passe</label>
              <input type="password" class="form-control" placeholder="Confirmez votre mot de passe">
            </div>
            <button type="submit" class="btn btn-dark w-100">Créer mon compte</button>
          </form>
          <hr>
          <p class="text-center mt-2">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2026 Saveurs de Bordeaux | Lundi - Dimanche</p>
    <a href="mentions-legales.html" class="text-warning">Mentions légales</a> |
    <a href="cgv.html" class="text-warning">CGV</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
