<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil - Saveurs de Bordeaux</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Saveurs de Bordeaux</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard-utilisateur.html">Mes commandes</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Mon profil</a></li>
          <li class="nav-item"><a class="nav-link text-warning" href="connexion.html">Se déconnecter</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-4 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h2 class="text-center mb-4">Mon Profil</h2>
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" value="Dupont">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" class="form-control" value="Marie">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Adresse email</label>
              <input type="email" class="form-control" value="marie@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Numéro GSM</label>
              <input type="tel" class="form-control" value="06 00 00 00 00">
            </div>
            <div class="mb-3">
              <label class="form-label">Adresse postale</label>
              <input type="text" class="form-control" value="12 Rue de la Paix, Bordeaux">
            </div>
            <hr>
            <h5>Changer le mot de passe</h5>
            <div class="mb-3">
              <label class="form-label">Ancien mot de passe</label>
              <input type="password" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Nouveau mot de passe</label>
              <input type="password" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmer le nouveau mot de passe</label>
              <input type="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-dark w-100">Enregistrer les modifications</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2026 Saveurs de Bordeaux | Lundi - Dimanche</p>
    <a href="mentions-legales.html" class="text-warning">Mentions légales</a> |
    <a href="cgv.html" class="text-warning">CGV</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
